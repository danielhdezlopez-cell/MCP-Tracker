<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
  <!-- Adamantium claws - left hand -->
  <line x1="58" y1="138" x2="38" y2="75" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="65" y1="135" x2="52" y2="68" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="72" y1="132" x2="66" y2="64" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Adamantium claws - right hand -->
  <line x1="128" y1="138" x2="148" y2="75" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="135" y1="135" x2="148" y2="68" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="142" y1="132" x2="162" y2="64" stroke="#dddddd" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Body -->
  <ellipse cx="100" cy="118" rx="30" ry="35" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <!-- Costume X -->
  <line x1="82" y1="100" x2="118" y2="136" stroke="#ffcc00" stroke-width="3" opacity="0.8"/>
  <line x1="118" y1="100" x2="82" y2="136" stroke="#ffcc00" stroke-width="3" opacity="0.8"/>
  <!-- Head with mask -->
  <ellipse cx="100" cy="74" rx="24" ry="26" fill="#1a1a1a" stroke="#333333" stroke-width="1.5"/>
  <!-- Mask slits (eyes) -->
  <ellipse cx="90" cy="72" rx="7" ry="5" fill="#ffcc00" filter="url(#glow)"/>
  <ellipse cx="110" cy="72" rx="7" ry="5" fill="#ffcc00" filter="url(#glow)"/>
  <!-- Wolverine ears/hair points -->
  <polygon points="82,56 75,38 90,52" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <polygon points="118,56 125,38 110,52" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Name -->
  <text x="100" y="170" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffcc00" font-weight="bold" letter-spacing="1">WEAPON X</text>
</svg>
