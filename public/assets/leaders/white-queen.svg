<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c8e0ff"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#e8f4ff" stroke-width="2" opacity="0.7"/>
  <!-- Diamond form crystals -->
  <polygon points="100,20 115,45 100,55 85,45" fill="#ddf0ff" stroke="#ffffff" stroke-width="1" opacity="0.9" filter="url(#glow)"/>
  <polygon points="68,35 83,55 68,68 53,55" fill="#c0e8ff" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <polygon points="132,35 147,55 132,68 117,55" fill="#c0e8ff" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <!-- Body silhouette -->
  <ellipse cx="100" cy="110" rx="30" ry="40" fill="#b0d4f0" stroke="#e0f0ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Head -->
  <ellipse cx="100" cy="72" rx="22" ry="26" fill="#e8f4ff" stroke="#ffffff" stroke-width="1"/>
  <!-- Diamond texture on body -->
  <polygon points="100,85 110,98 100,110 90,98" fill="#ddeeff" stroke="#aaddff" stroke-width="0.5" opacity="0.8"/>
  <polygon points="85,95 95,108 85,120 75,108" fill="#cce8ff" stroke="#aaddff" stroke-width="0.5" opacity="0.6"/>
  <polygon points="115,95 125,108 115,120 105,108" fill="#cce8ff" stroke="#aaddff" stroke-width="0.5" opacity="0.6"/>
  <!-- Crown/Hair -->
  <path d="M78,60 Q85,42 100,45 Q115,42 122,60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <!-- Name -->
  <text x="100" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8e8ff" font-weight="bold" letter-spacing="1">EMMA</text>
  <text x="100" y="179" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8e8ff" font-weight="bold" letter-spacing="1">FROST</text>
</svg>
